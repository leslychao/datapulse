databaseChangeLog:
  - changeSet:
      id: 0001-accounts-sales
      author: datapulse
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: marketplace
                  type: "VARCHAR(32)"
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: token_encrypted
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: "TIMESTAMP WITH TIME ZONE"
                  constraints:
                    nullable: false

        - createTable:
            tableName: sales_fact
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: dt
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: revenue
                  type: "NUMERIC(18,2)"
                  constraints:
                    nullable: false
              - column:
                  name: cost
                  type: "NUMERIC(18,2)"
                  constraints:
                    nullable: false
              - column:
                  name: margin
                  type: "NUMERIC(18,2)"
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: sales_fact
            columnNames: account_id, sku, dt
            constraintName: uq_sales_fact_acc_sku_dt

        - addForeignKeyConstraint:
            baseTableName: sales_fact
            baseColumnNames: account_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_sales_fact_account
            onDelete: CASCADE
