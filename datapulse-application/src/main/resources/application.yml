server:
  port: 8080

spring:
  application:
    name: datapulse

  datasource:
    url: "jdbc:postgresql://127.0.0.1:5434/datapulse?currentSchema=datapulse&reWriteBatchedInserts=true"
    username: "datapulse"
    password: "datapulse"
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.default_schema: datapulse
      hibernate.format_sql: true
      hibernate.jdbc.batch_size: 500
      hibernate.jdbc.fetch_size: 200
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.generate_statistics: false
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/master.xml
    default-schema: datapulse
    liquibase-schema: datapulse

marketplace:
  providers:
    wb:
      baseUrl: https://suppliers-api.wildberries.ru
      endpoints:
        sales: /public/api/sales
        stock: /public/api/stock
        finance: /public/api/finance
        reviews: /public/api/reviews
      resilience:
        limitForPeriod: 5
        maxConcurrentCalls: 4
        maxAttempts: 6
        baseBackoff: 500ms
        maxJitter: 300ms
        retryAfterFallback: 3s
    ozon:
      baseUrl: https://api-seller.ozon.ru
      endpoints:
        sales: /v1/analytics/sales
        stock: /v1/analytics/stock
        finance: /v1/finance/transactions
        reviews: /v1/reviews/list
      resilience:
        limitForPeriod: 3
        maxConcurrentCalls: 3
        maxAttempts: 5
        baseBackoff: 400ms
        maxJitter: 250ms
        retryAfterFallback: 2s
