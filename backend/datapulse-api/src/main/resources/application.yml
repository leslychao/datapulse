server:
  port: ${SERVER_PORT:8081}

spring:
  config:
    import: optional:file:../../infra/.env[.properties]
  application:
    name: datapulse-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:datapulse}
    username: ${POSTGRES_USER:datapulse}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:datapulse}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA:datapulse}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/${KEYCLOAK_REALM:datapulse}}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/${KEYCLOAK_REALM:datapulse}/protocol/openid-connect/certs}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:datapulse}
    password: ${RABBITMQ_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

datapulse:
  s3:
    endpoint: http://${S3_HOST:localhost}:${S3_PORT:9010}
    access-key: ${S3_ACCESS_KEY:datapulse}
    secret-key: ${S3_SECRET_KEY:}
    raw-bucket: ${S3_RAW_BUCKET:datapulse-raw}
  etl:
    retention:
      finance-months: ${ETL_RETENTION_FINANCE_MONTHS:12}
      flow-months: ${ETL_RETENTION_FLOW_MONTHS:6}
      state-keep-count: ${ETL_RETENTION_STATE_KEEP_COUNT:3}
      cron: ${ETL_RETENTION_CRON:0 0 3 * * ?}
    temp-dir: ${DATAPULSE_ETL_TEMP_DIR:${java.io.tmpdir}/datapulse-raw}
    sync-poll-interval: ${ETL_SYNC_POLL_INTERVAL:PT1M}
    ingest:
      canonical-batch-size: ${ETL_CANONICAL_BATCH_SIZE:500}
      clickhouse-batch-size: ${ETL_CLICKHOUSE_BATCH_SIZE:5000}
      job-timeout: ${ETL_JOB_TIMEOUT:PT2H}
      max-job-retries: ${ETL_MAX_JOB_RETRIES:3}
      min-retry-backoff: ${ETL_MIN_RETRY_BACKOFF:PT5M}
      max-retry-backoff: ${ETL_MAX_RETRY_BACKOFF:PT30M}
      retry-backoff-multiplier: ${ETL_RETRY_BACKOFF_MULTIPLIER:2}
      sync-next-attempt-after-error: ${ETL_SYNC_NEXT_ATTEMPT_AFTER_ERROR:PT15M}
      # SYNC = materialize in ingest worker; ASYNC_OUTBOX = ETL_POST_INGEST_MATERIALIZE on etl.sync queue
      post-ingest-materialization-mode: ${ETL_POST_INGEST_MATERIALIZATION_MODE:SYNC}
      materializing-stale-threshold: ${ETL_MATERIALIZING_STALE_THRESHOLD:PT1H}
  vault:
    uri: http://${VAULT_HOST:localhost}:${VAULT_PORT:8200}
    token: ${VAULT_TOKEN:}
    credential-cache-ttl: ${VAULT_CREDENTIAL_CACHE_TTL:1h}
    base-path: ${VAULT_BASE_PATH:secret/data/datapulse}
  integration:
    wildberries:
      content-base-url: ${WB_CONTENT_BASE_URL:https://content-api.wildberries.ru}
      prices-base-url: ${WB_PRICES_BASE_URL:https://discounts-prices-api.wildberries.ru}
      prices-write-base-url: ${WB_PRICES_WRITE_BASE_URL:${WB_PRICES_BASE_URL:https://discounts-prices-api.wildberries.ru}}
      statistics-base-url: ${WB_STATISTICS_BASE_URL:https://statistics-api.wildberries.ru}
      analytics-base-url: ${WB_ANALYTICS_BASE_URL:https://seller-analytics-api.wildberries.ru}
      marketplace-base-url: ${WB_MARKETPLACE_BASE_URL:https://marketplace-api.wildberries.ru}
      promo-base-url: ${WB_PROMO_BASE_URL:https://dp-calendar-api.wildberries.ru}
      advert-base-url: ${WB_ADVERT_BASE_URL:https://advert-api.wildberries.ru}
    ozon:
      seller-base-url: ${OZON_SELLER_BASE_URL:https://api-seller.ozon.ru}
      seller-write-base-url: ${OZON_SELLER_WRITE_BASE_URL:${OZON_SELLER_BASE_URL:https://api-seller.ozon.ru}}
      performance-base-url: ${OZON_PERFORMANCE_BASE_URL:https://api-performance.ozon.ru}
    rate-limits:
      groups:
        OZON_DEFAULT:
          initialRate: ${OZON_DEFAULT_INITIAL_RATE:2.0}
        OZON_PROMO:
          initialRate: ${OZON_PROMO_INITIAL_RATE:1.0}
    health-check:
      interval: ${HEALTH_CHECK_INTERVAL:PT15M}
      failure-threshold: ${HEALTH_CHECK_FAILURE_THRESHOLD:3}
    # Full request URI + JSON body (POST) for ETL marketplace adapters; pagination lives in query/body.
    marketplace-http-logging:
      enabled: ${INTEGRATION_MARKETPLACE_HTTP_LOGGING_ENABLED:false}
      max-body-chars: ${INTEGRATION_MARKETPLACE_HTTP_LOGGING_MAX_BODY_CHARS:8192}
  clickhouse:
    url: jdbc:clickhouse://${CH_HOST:localhost}:${CH_PORT:8123}/${CH_DATABASE:datapulse}
    username: ${CH_USERNAME:default}
    password: ${CH_PASSWORD:}
    migration:
      enabled: ${CH_MIGRATION_ENABLED:true}
  alerting:
    stale-data-interval: ${ALERTING_STALE_DATA_INTERVAL:PT5M}
    missing-sync-interval: ${ALERTING_MISSING_SYNC_INTERVAL:PT15M}
    mismatch-interval: ${ALERTING_MISMATCH_INTERVAL:PT30M}
  execution:
    max-attempts: ${EXECUTION_MAX_ATTEMPTS:3}
    min-backoff: ${EXECUTION_MIN_BACKOFF:PT5S}
    max-backoff: ${EXECUTION_MAX_BACKOFF:PT5M}
    backoff-multiplier: ${EXECUTION_BACKOFF_MULTIPLIER:2}
    approval-timeout-hours: ${EXECUTION_APPROVAL_TIMEOUT_HOURS:24}
    reconciliation:
      initial-delay: ${EXECUTION_RECON_INITIAL_DELAY:PT30S}
      backoff-multiplier: ${EXECUTION_RECON_BACKOFF_MULTIPLIER:2}
      max-attempts: ${EXECUTION_RECON_MAX_ATTEMPTS:3}
      timeout: ${EXECUTION_RECON_TIMEOUT:PT10M}
    deferred-action-interval: ${EXECUTION_DEFERRED_ACTION_INTERVAL:PT30S}
    stuck-state:
      interval: ${EXECUTION_STUCK_INTERVAL:PT5M}
      executing-ttl: ${EXECUTION_STUCK_EXECUTING_TTL:PT5M}
      retry-scheduled-grace: ${EXECUTION_STUCK_RETRY_GRACE:PT5M}
      reconciliation-pending-ttl: ${EXECUTION_STUCK_RECON_PENDING_TTL:PT10M}
      scheduled-ttl: ${EXECUTION_STUCK_SCHEDULED_TTL:PT5M}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    runtime: ${OUTBOX_RUNTIME:ALL}
    poll-interval: ${OUTBOX_POLL_INTERVAL:PT1S}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    max-retry-count: ${OUTBOX_MAX_RETRY_COUNT:5}
    retry-backoff: ${OUTBOX_RETRY_BACKOFF:PT30S}
  mail:
    from: ${MAIL_FROM:noreply@datapulse.io}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:4200/invitation/accept}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info,prometheus,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
