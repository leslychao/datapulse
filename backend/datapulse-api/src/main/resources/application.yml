server:
  port: 8081

spring:
  config:
    import: optional:file:../../infra/.env[.properties]
  application:
    name: datapulse-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:datapulse}
    username: ${POSTGRES_USER:datapulse}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: datapulse
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: datapulse
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:${KEYCLOAK_PORT:8080}/realms/${KEYCLOAK_REALM:datapulse}
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/${KEYCLOAK_REALM:datapulse}/protocol/openid-connect/certs
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:datapulse}
    password: ${RABBITMQ_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

datapulse:
  s3:
    endpoint: http://${S3_HOST:localhost}:${S3_PORT:9010}
    access-key: ${S3_ACCESS_KEY:datapulse}
    secret-key: ${S3_SECRET_KEY:}
    raw-bucket: datapulse-raw
  etl:
    retention:
      finance-months: 12
      flow-months: 6
      state-keep-count: 3
      cron: "0 0 3 * * ?"
    temp-dir: ${DATAPULSE_ETL_TEMP_DIR:${java.io.tmpdir}/datapulse-raw}
    sync-poll-interval: PT1M
    ingest:
      canonical-batch-size: 500
      clickhouse-batch-size: 5000
      job-timeout: PT2H
      max-job-retries: 3
      min-retry-backoff: PT5M
      max-retry-backoff: PT30M
      retry-backoff-multiplier: 2
  vault:
    uri: http://${VAULT_HOST:localhost}:${VAULT_PORT:8200}
    token: ${VAULT_TOKEN:}
    credential-cache-ttl: 1h
    base-path: secret/data/datapulse
  integration:
    wildberries:
      content-base-url: ${WB_CONTENT_BASE_URL:https://content-api.wildberries.ru}
      prices-base-url: ${WB_PRICES_BASE_URL:https://discounts-prices-api.wildberries.ru}
      statistics-base-url: ${WB_STATISTICS_BASE_URL:https://statistics-api.wildberries.ru}
      analytics-base-url: ${WB_ANALYTICS_BASE_URL:https://seller-analytics-api.wildberries.ru}
      marketplace-base-url: ${WB_MARKETPLACE_BASE_URL:https://marketplace-api.wildberries.ru}
      advert-base-url: ${WB_ADVERT_BASE_URL:https://advert-api.wildberries.ru}
      promo-base-url: ${WB_PROMO_BASE_URL:https://dp-calendar-api.wildberries.ru}
    ozon:
      seller-base-url: ${OZON_SELLER_BASE_URL:https://api-seller.ozon.ru}
      performance-base-url: ${OZON_PERFORMANCE_BASE_URL:https://api-performance.ozon.ru}
    health-check:
      interval: PT15M
      failure-threshold: 3
  clickhouse:
    url: jdbc:clickhouse://${CH_HOST:localhost}:${CH_PORT:8123}/${CH_DATABASE:datapulse}
    username: ${CH_USERNAME:default}
    password: ${CH_PASSWORD:}
    migration:
      enabled: true
  alerting:
    stale-data-interval: PT5M
    missing-sync-interval: PT15M
    mismatch-interval: PT30M
  execution:
    max-attempts: 3
    min-backoff: PT5S
    max-backoff: PT5M
    backoff-multiplier: 2
    approval-timeout-hours: 24
    reconciliation:
      initial-delay: PT30S
      backoff-multiplier: 2
      max-attempts: 3
      timeout: PT10M
    stuck-state:
      interval: PT5M
      executing-ttl: PT5M
      retry-scheduled-grace: PT5M
      reconciliation-pending-ttl: PT10M
      scheduled-ttl: PT5M
  outbox:
    enabled: true
    runtime: ALL
    poll-interval: PT1S
    batch-size: 50
    max-retry-count: 5
    retry-backoff: PT30S

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
