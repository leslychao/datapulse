server:
  port: 8081

spring:
  application:
    name: datapulse-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:datapulse}
    username: ${DB_USERNAME:datapulse}
    password: ${DB_PASSWORD:changeme}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/datapulse}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:datapulse}
    password: ${RABBITMQ_PASSWORD:changeme}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

datapulse:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9010}
    access-key: ${S3_ACCESS_KEY:datapulse}
    secret-key: ${S3_SECRET_KEY:changeme}
    raw-bucket: datapulse-raw
  etl:
    retention:
      finance-months: 12
      flow-months: 6
      state-keep-count: 3
      cron: "0 0 3 * * ?"
    temp-dir: ${DATAPULSE_ETL_TEMP_DIR:${java.io.tmpdir}/datapulse-raw}
    sync-poll-interval: PT1M
    ingest:
      canonical-batch-size: 500
      clickhouse-batch-size: 5000
      job-timeout: PT2H
      max-job-retries: 3
      min-retry-backoff: PT5M
      max-retry-backoff: PT30M
      retry-backoff-multiplier: 2
  vault:
    uri: ${VAULT_ADDR:http://localhost:8200}
    token: ${VAULT_TOKEN:dev-token}
    credential-cache-ttl: 1h
    base-path: secret/data/datapulse
  integration:
    wildberries:
      content-base-url: ${WB_CONTENT_BASE_URL:https://content-api.wildberries.ru}
      prices-base-url: ${WB_PRICES_BASE_URL:https://discounts-prices-api.wildberries.ru}
      statistics-base-url: ${WB_STATISTICS_BASE_URL:https://statistics-api.wildberries.ru}
      analytics-base-url: ${WB_ANALYTICS_BASE_URL:https://seller-analytics-api.wildberries.ru}
      marketplace-base-url: ${WB_MARKETPLACE_BASE_URL:https://marketplace-api.wildberries.ru}
      advert-base-url: ${WB_ADVERT_BASE_URL:https://advert-api.wildberries.ru}
      promo-base-url: ${WB_PROMO_BASE_URL:https://dp-calendar-api.wildberries.ru}
    ozon:
      seller-base-url: ${OZON_SELLER_BASE_URL:https://api-seller.ozon.ru}
      performance-base-url: ${OZON_PERFORMANCE_BASE_URL:https://api-performance.ozon.ru}
    health-check:
      interval: PT15M
      failure-threshold: 3
  clickhouse:
    url: jdbc:clickhouse://${CH_HOST:localhost}:${CH_PORT:8123}/${CH_DATABASE:datapulse}
    username: ${CH_USERNAME:default}
    password: ${CH_PASSWORD:}
    migration:
      enabled: true
  outbox:
    enabled: true
    runtime: ALL
    poll-interval: PT1S
    batch-size: 50
    max-retry-count: 5
    retry-backoff: PT30S

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
