<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5;">
<table width="100%" cellpadding="0" cellspacing="0" style="padding: 32px 16px;">
    <tr>
        <td align="center">
            <table width="560" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 8px; padding: 40px;">
                <tr>
                    <td>
                        <h1 style="margin: 0 0 16px; font-size: 22px; color: #111;">Datapulse</h1>
                        <p style="margin: 0 0 24px; font-size: 15px; color: #333; line-height: 1.6;">
                            <strong th:text="${inviterName}">Коллега</strong> приглашает вас
                            в рабочее пространство <strong th:text="${workspaceName}">Workspace</strong>.
                        </p>
                        <p style="margin: 0 0 32px;">
                            <a th:href="${invitationLink}"
                               style="display: inline-block; padding: 12px 24px; background: #3b82f6; color: #fff; border-radius: 6px; text-decoration: none; font-size: 15px; font-weight: 500;">
                                Принять приглашение
                            </a>
                        </p>
                        <p style="margin: 0; font-size: 13px; color: #888; line-height: 1.5;">
                            Ссылка действительна <span th:text="${expirationDays}">7</span> дней.
                            Если вы не ожидали это приглашение, просто проигнорируйте письмо.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
