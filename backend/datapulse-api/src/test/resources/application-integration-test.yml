spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${TEST_KEYCLOAK_HOST:localhost}:${TEST_KEYCLOAK_PORT:18080}/realms/test
          jwk-set-uri: http://${TEST_KEYCLOAK_HOST:localhost}:${TEST_KEYCLOAK_PORT:18080}/realms/test/protocol/openid-connect/certs

datapulse:
  s3:
    endpoint: http://${TEST_S3_HOST:localhost}:${TEST_S3_PORT:9000}
    access-key: test
    secret-key: test
    raw-bucket: test-bucket
  vault:
    uri: http://${TEST_VAULT_HOST:localhost}:${TEST_VAULT_PORT:8200}
    token: test-token
    credential-cache-ttl: 1h
    base-path: secret/data/datapulse-test
  clickhouse:
    url: jdbc:ch://${TEST_CH_HOST:localhost}:${TEST_CH_PORT:8123}/default
    username: default
    password: ""
    migration:
      enabled: false
  integration:
    wildberries:
      content-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      prices-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      statistics-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      analytics-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      marketplace-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      promo-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
      advert-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_WIREMOCK_PORT:9090}
    ozon:
      seller-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_OZON_WIREMOCK_PORT:9091}
      performance-base-url: http://${TEST_WIREMOCK_HOST:localhost}:${TEST_OZON_WIREMOCK_PORT:9091}
    health-check:
      interval: PT1H
      failure-threshold: 3
  execution:
    max-attempts: 3
    min-backoff: PT5S
    max-backoff: PT5M
    backoff-multiplier: 2
    approval-timeout-hours: 24
    reconciliation:
      initial-delay: PT30S
      backoff-multiplier: 2
      max-attempts: 3
      timeout: PT10M
    stuck-state:
      interval: PT5M
      executing-ttl: PT5M
      retry-scheduled-grace: PT5M
      reconciliation-pending-ttl: PT10M
      scheduled-ttl: PT5M
  outbox:
    enabled: false
    runtime: ALL
    poll-interval: PT10S
    batch-size: 50
    max-retry-count: 5
    retry-backoff: PT30S
  alerting:
    stale-data-interval: PT1H
    missing-sync-interval: PT1H
    mismatch-interval: PT1H
  mail:
    from: test@datapulse.io
    invitation-base-url: http://localhost:4200/invitation/accept

logging:
  level:
    io.datapulse: DEBUG
    org.hibernate.SQL: DEBUG
