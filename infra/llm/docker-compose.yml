# DataPulse LLM Server — self-hosted Qwen3 via vLLM.
#
# Runs independently from the main infra stack.
# Backend connects via HTTP (LLM_BASE_URL in main .env).
#
# Usage:
#   cp .env.example .env        # adjust if needed
#   docker compose up -d        # first run downloads the model (~5-8 GB)
#   docker compose logs -f      # watch until "Uvicorn running on ..."
#
# Model swap (no code changes):
#   1. Edit LLM_MODEL in .env
#   2. docker compose down && docker compose up -d
#
# Requires: nvidia-container-toolkit (nvidia-docker)
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: datapulse-llm
    command: >
      --model ${LLM_MODEL:-Qwen/Qwen3-8B}
      --served-model-name datapulse
      --max-model-len ${LLM_MAX_CONTEXT:-4096}
      --gpu-memory-utilization ${LLM_GPU_MEM_UTIL:-0.90}
      --max-num-seqs ${LLM_MAX_CONCURRENT:-8}
      --quantization ${LLM_QUANTIZATION:-gptq}
      --trust-remote-code
    ports:
      - "${LLM_PORT:-8100}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  huggingface-cache:
