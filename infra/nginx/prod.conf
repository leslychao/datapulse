map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name datapulse.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name datapulse.example.com;

    ssl_certificate     /etc/ssl/certs/datapulse.example.com.crt;
    ssl_certificate_key /etc/ssl/private/datapulse.example.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- OAuth2 Proxy endpoints ---

    location /oauth2/ {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length     "";
        proxy_pass_request_body            off;
    }

    # --- API (protected) ---

    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_token  $upstream_http_x_auth_request_access_token;

        error_page 401 = @error_401_json;

        proxy_set_header X-Auth-Request-User         $auth_user;
        proxy_set_header X-Auth-Request-Email        $auth_email;
        proxy_set_header X-Auth-Request-Access-Token $auth_token;
        proxy_set_header Authorization               "Bearer $auth_token";
        proxy_set_header Host                        $host;
        proxy_set_header X-Real-IP                   $remote_addr;
        proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto           $scheme;

        proxy_pass http://backend:8081;
    }

    # --- WebSocket (protected) ---

    location /ws {
        auth_request /oauth2/auth;
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_token  $upstream_http_x_auth_request_access_token;

        error_page 401 = @error_401_json;

        proxy_set_header X-Auth-Request-User         $auth_user;
        proxy_set_header X-Auth-Request-Email        $auth_email;
        proxy_set_header X-Auth-Request-Access-Token $auth_token;
        proxy_set_header Authorization               "Bearer $auth_token";
        proxy_set_header Host                        $host;
        proxy_set_header X-Real-IP                   $remote_addr;
        proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto           $scheme;
        proxy_set_header Upgrade                     $http_upgrade;
        proxy_set_header Connection                  $connection_upgrade;
        proxy_http_version 1.1;

        proxy_pass http://backend:8081;
    }

    # --- Keycloak (OIDC endpoints for browser) ---

    location /auth/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://keycloak:8080/;
    }

    # --- Frontend (container — public) ---

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://frontend:80;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # --- Error handler: 401 as JSON ---

    location @error_401_json {
        default_type application/json;
        return 401 '{"error": "unauthorized", "message": "Authentication required"}';
    }
}
