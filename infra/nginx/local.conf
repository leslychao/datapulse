map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    set $backend  host.docker.internal:8081;
    set $frontend host.docker.internal:4200;

    # --- OAuth2 Proxy endpoints ---

    location /oauth2/ {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header Content-Length     "";
        proxy_pass_request_body            off;
    }

    # --- API (protected) ---

    location /api/ {
        auth_request /oauth2/auth;
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_token  $upstream_http_x_auth_request_access_token;

        error_page 401 = @error_401_json;

        proxy_set_header X-Auth-Request-User         $auth_user;
        proxy_set_header X-Auth-Request-Email        $auth_email;
        proxy_set_header X-Auth-Request-Access-Token $auth_token;
        proxy_set_header Authorization               "Bearer $auth_token";
        proxy_set_header Host                        $host;
        proxy_set_header X-Real-IP                   $remote_addr;
        proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto           $proxy_x_forwarded_proto;

        proxy_pass http://$backend;
    }

    # --- WebSocket (protected) ---

    location /ws {
        auth_request /oauth2/auth;
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_token  $upstream_http_x_auth_request_access_token;

        error_page 401 = @error_401_json;

        proxy_set_header X-Auth-Request-User         $auth_user;
        proxy_set_header X-Auth-Request-Email        $auth_email;
        proxy_set_header X-Auth-Request-Access-Token $auth_token;
        proxy_set_header Authorization               "Bearer $auth_token";
        proxy_set_header Host                        $host;
        proxy_set_header X-Real-IP                   $remote_addr;
        proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto           $proxy_x_forwarded_proto;
        proxy_set_header Upgrade                     $http_upgrade;
        proxy_set_header Connection                  $connection_upgrade;
        proxy_http_version 1.1;

        proxy_pass http://$backend;
    }

    # --- Keycloak (OIDC endpoints for browser) ---

    location /auth/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_pass http://keycloak:8080/;
    }

    # --- Frontend (ng serve on host — public) ---

    location / {
        proxy_pass http://$frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_http_version 1.1;
    }

    # --- Error handler: 401 as JSON ---

    location @error_401_json {
        default_type application/json;
        return 401 '{"error": "unauthorized", "message": "Authentication required"}';
    }
}
