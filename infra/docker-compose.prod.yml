version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datapulse
      SPRING_DATASOURCE_USERNAME: datapulse
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: datapulse
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - keycloak
      - oauth2-proxy

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: datapulse-proxy
      OAUTH2_PROXY_CLIENT_SECRET: proxy-secret-change-me
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/realms/datapulse
      OAUTH2_PROXY_REDIRECT_URL: https://datapulse.example.com/oauth2/callback
      OAUTH2_PROXY_UPSTREAM: static://202
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SCOPE: openid email profile
    depends_on:
      - keycloak

  keycloak:
    command: start --optimized --import-realm
    environment:
      KC_HOSTNAME: datapulse.example.com
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

volumes:
  postgres-data:
  clickhouse-data:
  minio-data:
  grafana-data:
