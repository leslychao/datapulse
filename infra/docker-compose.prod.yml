# Production environment: everything in Docker, TLS, real domain.
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseG1GC}
      SERVER_PORT: ${SERVER_PORT:-8081}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA:-datapulse}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-datapulse}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@datapulse.io}
      INVITATION_BASE_URL: https://${PROD_DOMAIN}/invitation/accept
      KEYCLOAK_ISSUER_URI: https://${PROD_DOMAIN}/realms/${KEYCLOAK_REALM:-datapulse}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/certs
      S3_HOST: minio
      S3_PORT: 9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-datapulse}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_RAW_BUCKET: ${S3_RAW_BUCKET:-datapulse-raw}
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_BASE_PATH: ${VAULT_BASE_PATH:-secret/data/datapulse}
      CH_HOST: clickhouse
      CH_PORT: 8123
      CH_DATABASE: ${CH_DATABASE:-datapulse}
      CH_USERNAME: ${CH_USERNAME:-default}
      CH_PASSWORD: ${CH_PASSWORD}
      CH_MIGRATION_ENABLED: ${CH_MIGRATION_ENABLED:-true}
      OUTBOX_ENABLED: ${OUTBOX_ENABLED:-true}
      OUTBOX_RUNTIME: ${OUTBOX_RUNTIME:-ALL}
      MANAGEMENT_ENDPOINTS_INCLUDE: ${MANAGEMENT_ENDPOINTS_INCLUDE:-health,info,prometheus,metrics}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        CONFIGURATION: production
    expose:
      - "80"

  keycloak:
    command: start --optimized --import-realm
    environment:
      KC_HOSTNAME: https://${PROD_DOMAIN}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

  oauth2-proxy:
    environment:
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${PROD_DOMAIN}/realms/${KEYCLOAK_REALM:-datapulse}
      OAUTH2_PROXY_REDIRECT_URL: https://${PROD_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_LOGIN_URL: https://${PROD_DOMAIN}/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_VALIDATE_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_COOKIE_SECURE: "true"

  nginx:
    ports:
      - "${PROD_NGINX_PORT:-8880}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  prometheus:
    volumes:
      - ./prometheus/docker.yml:/etc/prometheus/prometheus.yml:ro
