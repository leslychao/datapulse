# Production environment: everything in Docker, TLS, real domain.
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-datapulse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-datapulse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-datapulse}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://${PROD_DOMAIN}/auth/realms/${KEYCLOAK_REALM:-datapulse}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/certs
      DATAPULSE_S3_ENDPOINT: http://minio:9000
      DATAPULSE_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-datapulse}
      DATAPULSE_S3_SECRET_KEY: ${S3_SECRET_KEY}
      DATAPULSE_VAULT_URI: http://vault:8200
      DATAPULSE_VAULT_TOKEN: ${VAULT_TOKEN}
      DATAPULSE_CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/${CH_DATABASE:-datapulse}
      DATAPULSE_CLICKHOUSE_USERNAME: ${CH_USERNAME:-default}
      DATAPULSE_CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        CONFIGURATION: production
    expose:
      - "80"

  keycloak:
    command: start --optimized --import-realm
    environment:
      KC_HOSTNAME: https://${PROD_DOMAIN}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

  oauth2-proxy:
    environment:
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${PROD_DOMAIN}/auth/realms/${KEYCLOAK_REALM:-datapulse}
      OAUTH2_PROXY_REDIRECT_URL: https://${PROD_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_LOGIN_URL: https://${PROD_DOMAIN}/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_VALIDATE_URL: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_COOKIE_SECURE: "true"

  nginx:
    ports:
      - "${PROD_NGINX_PORT:-8880}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  prometheus:
    volumes:
      - ./prometheus/docker.yml:/etc/prometheus/prometheus.yml:ro
