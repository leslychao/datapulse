# Global reverse proxy: TLS termination (Let's Encrypt) + proxy to infra Nginx.
#
# First start (DNS must already point to this server):
#   docker compose up -d
#   init-certs obtains a real Let's Encrypt certificate automatically.
#
# After that, certbot auto-renews every 12 hours.

services:
  nginx:
    image: nginx:alpine
    container_name: datapulse-global-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully

  init-certs:
    image: certbot/certbot
    container_name: datapulse-init-certs
    ports:
      - "80:80"
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:-mydatapulse.ru}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?Set CERTBOT_EMAIL in .env}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        CERT_DIR="/etc/letsencrypt/live/$$DOMAIN"
        if [ -f "$$CERT_DIR/fullchain.pem" ]; then
          ISSUER=$$(openssl x509 -in "$$CERT_DIR/fullchain.pem" -noout -issuer 2>/dev/null || true)
          if echo "$$ISSUER" | grep -qi "Let's Encrypt"; then
            echo "Real Let's Encrypt certificate exists, renewing if needed..."
            certbot renew
            exit 0
          fi
          echo "Removing non-LE certificate..."
          rm -rf "$$CERT_DIR"
          rm -f "/etc/letsencrypt/renewal/$$DOMAIN.conf"
        fi
        echo "Obtaining Let's Encrypt certificate for $$DOMAIN..."
        certbot certonly \
          --standalone \
          --preferred-challenges http \
          -d "$$DOMAIN" \
          --email "$$CERTBOT_EMAIL" \
          --agree-tos \
          --no-eff-email
        echo "Certificate obtained successfully."

  certbot:
    image: certbot/certbot
    container_name: datapulse-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  certbot-webroot:
  certbot-certs:
