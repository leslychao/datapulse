# Global reverse proxy: TLS termination (Let's Encrypt) + proxy to infra Nginx.
#
# First start (DNS must already point to this server):
#   docker compose up -d
#   init-certs obtains a real Let's Encrypt certificate automatically.
#
# After that, certbot auto-renews every 12 hours.

services:
  nginx:
    image: nginx:alpine
    container_name: datapulse-global-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      UPSTREAM_PORT: ${UPSTREAM_PORT:-8880}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully

  init-certs:
    image: certbot/certbot
    container_name: datapulse-init-certs
    ports:
      - "80:80"
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:-mydatapulse.ru}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?Set CERTBOT_EMAIL in .env}
    entrypoint:
      - sh
      - -c
      - |
        CERT_DIR="/etc/letsencrypt/live/$$DOMAIN"
        CERT_FILE="$$CERT_DIR/fullchain.pem"
        KEY_FILE="$$CERT_DIR/privkey.pem"

        is_le() { openssl x509 -in "$$CERT_FILE" -noout -issuer 2>/dev/null | grep -qi "Let's Encrypt"; }

        # --- 1. LE certificate exists ---
        if [ -f "$$CERT_FILE" ] && is_le; then
          if openssl x509 -in "$$CERT_FILE" -noout -checkend 2592000 2>/dev/null; then
            echo "LE certificate valid for >30 days, nothing to do."
            exit 0
          fi
          echo "LE certificate expiring soon, attempting renewal..."
          certbot renew && exit 0
          echo "WARNING: renewal failed, but existing LE cert still usable."
          exit 0
        fi

        # --- 2. No LE cert (either self-signed or missing) — try to obtain ---
        echo "Attempting to obtain Let's Encrypt certificate..."
        if certbot certonly \
          --standalone \
          --preferred-challenges http \
          -d "$$DOMAIN" \
          --email "$$CERTBOT_EMAIL" \
          --agree-tos \
          --no-eff-email; then
          echo "LE certificate obtained successfully."
          exit 0
        fi

        # --- 3. LE failed — use existing self-signed or generate new one ---
        if [ -f "$$CERT_FILE" ]; then
          echo "WARNING: LE failed, keeping existing certificate."
          exit 0
        fi

        echo "WARNING: LE failed and no certificate exists."
        echo "Generating self-signed fallback so nginx can start."
        mkdir -p "$$CERT_DIR"
        openssl req -x509 -nodes -days 7 \
          -newkey rsa:2048 \
          -keyout "$$KEY_FILE" \
          -out "$$CERT_FILE" \
          -subj "/CN=$$DOMAIN"
        echo "Self-signed fallback created (7 days). Will be replaced with LE on next successful attempt."

  certbot:
    image: certbot/certbot
    container_name: datapulse-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  certbot-webroot:
  certbot-certs:
