# Local environment: backend + frontend run natively on the host.
# Nginx proxies to host.docker.internal, prometheus scrapes from host.
services:
  oauth2-proxy:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OAUTH2_PROXY_REDIRECT_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}/oauth2/callback
      OAUTH2_PROXY_REDEEM_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8180}/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8180}/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/certs
      OAUTH2_PROXY_PROFILE_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8180}/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo
      OAUTH2_PROXY_VALIDATE_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8180}/realms/${KEYCLOAK_REALM:-datapulse}/protocol/openid-connect/userinfo

  nginx:
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    volumes:
      - ./prometheus/local.yml:/etc/prometheus/prometheus.yml:ro
